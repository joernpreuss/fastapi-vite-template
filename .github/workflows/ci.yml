name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
      - run: uv sync --locked
      - run: uv run ruff check
      - run: uv run ruff format --check .
      - run: uv run mypy .
      - run: uv run pytest
